<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo Luparele - Cartão Virtual</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#F8F8F8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="profile-header">
        <button class="share-button" id="openShareModal" title="Compartilhar">
            <i class="fas fa-share-alt"></i>
        </button>
        <div class="profile-pic-container">
            <img src="img/perfil.png" alt="Sua Foto" class="profile-pic">
        </div>
        <h1>Eduardo Luparele</h1>
        <p>Coordenador Securitário</p>

        <div class="logo-container">
            <img src="img/logo.png" alt="Logo da Empresa" class="company-logo">
        </div>
    </header>

    <main class="button-container">
        <a href="https://wa.me/5521971292787" target="_blank" class="button whatsapp-button">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a href="tel:+5521971292787" class="button primary-button">
            <i class="fas fa-phone"></i> Ligar
        </a>
        <a href="mailto:security@intalog.com.br" class="button email-button">
            <i class="fas fa-envelope"></i> Email
        </a>
        <a href="https://www.linkedin.com/in/eduardo-luparele-coelho-492851296/" target="_blank" class="button social-button linkedin">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
        <!--
        <a href="https://www.instagram.com/eduardo_luparele" target="_blank" class="button social-button instagram">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://github.com/Luparele" target="_blank" class="button social-button github">
            <i class="fab fa-github"></i> GitHub
        </a>
        <button class="button pix-button" id="openPixQr">
            <i class="fas fa-qrcode"></i> Pix QR Code
        </button>
        -->
        <button class="button save-contact-button" id="saveContact">
            <i class="fas fa-address-book"></i> Salvar Contato
        </button>
    </main>

    <div id="pixModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Seu Pix QR Code</h2>
            <img src="img/pix.jpg" alt="QR Code Pix" class="pix-qr-img">
            <p>Ou copie a chave Pix: <span id="pixKey">09995146797</span> <button class="copy-button" data-clipboard-target="#pixKey">Copiar</button></p>
        </div>
    </div>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeShareModal">&times;</span>
            <h2>Compartilhar Cartão</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://luparele.github.io/cartao-virtual/" alt="QR Code" class="share-qr-img">
            <p>Escaneie para acessar o cartão virtual</p>
            <div class="share-url-container" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <input type="text" value="https://luparele.github.io/cartao-virtual/" id="shareUrl" readonly style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd; text-align: center; font-size: 0.85em;">
                <button class="copy-button" data-clipboard-target="#shareUrl">Copiar Link</button>
            </div>
        </div>
    </div>


    <footer class="footer">
        <p>&copy; 2025 Eduardo Luparele. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.8/clipboard.min.js"></script>
</body>
</html>
